<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Hospital | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 14px;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        .container {
            width: 100%;
            padding: 10px;
        }

        @media (min-width: 768px) and (max-width: 1024px) {
            body {
                font-size: 16px;
                background-color: #e0f7fa;
            }

            .container {
                width: 90%;
                padding: 20px;
            }
        }

        @media (min-width: 1025px) {
            body {
                font-size: 18px;
                background-color: #ffffff;
            }

            .container {
                width: 80%;
                margin: auto;
                padding: 30px;
            }
        }

        @media (orientation: landscape) {
            body {
                background-color: #fff3e0;
            }
        }

        @media (-webkit-min-device-pixel-ratio: 2),
        (min-resolution: 192dpi) {
            body {
                font-weight: bold;
            }
        }
    </style>
</head>

<body style="
             background-image: url(./image/33.png);
             background-size: 100% 100%;
             background-size: cover;
             background-position: center;
             min-height: 100vh;
             display: flex;
             align-items: center;
             justify-content: center;">
    <div class="absolute inset-0 bg-black/40"></div>
    <div class="relative bg-[#F4FBFC] w-full max-w-md rounded-3xl shadow-2xl p-10 z-10">

        <div class="flex justify-center mb-6">
            <div class="w-16 h-16 rounded-full bg-gradient-to-br from-[#0EA5E9] to-[#0E7490]
                  flex items-center justify-center text-white text-2xl font-bold shadow-lg">
                H
            </div>
        </div>

        <h1 class="text-3xl font-extrabold text-center text-[#0C1A28]">
            Smart Hospital
        </h1>
        <p class="text-center text-gray-500 mt-1 mb-8">
            Patient Secure Access Portal
        </p>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">
                    Patient Name
                </label>
                <input type="text" placeholder="Enter full name" required class="w-full px-5 py-3 rounded-xl bg-white border border-gray-200
                 focus:ring-2 focus:ring-[#0EA5E9] outline-none" />
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">
                    Mobile Number
                </label>
                <input type="tel" placeholder="03XX-XXXXXXX" required class="w-full px-5 py-3 rounded-xl bg-white border border-gray-200
                 focus:ring-2 focus:ring-[#0EA5E9] outline-none" />
            </div>

            <button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-[#0E7490] to-[#0EA5E9]
               text-white font-bold text-lg hover:opacity-90 transition">
                Secure Login
            </button>
        </form>

        <p class="text-center text-xs text-gray-500 mt-8">
            By continuing, you agree to our
            <span class="text-[#0EA5E9] font-semibold cursor-pointer">
                Hospital Policy
            </span>
        </p>

    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();
            window.location.href = "index2.html";
        });
    </script>

</body>

</html>
